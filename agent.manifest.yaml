name: agent-framework-full-sample
description: >
  A full-featured Microsoft Agent Framework sample demonstrating custom tools,
  multi-agent workflow orchestration, and observability. Hosted on Azure AI Foundry
  using the Responses protocol.
metadata:
  tags:
    - Agent Framework
    - AI Agent Hosting
    - Azure AI Foundry
    - Responses Protocol
    - Multi-Agent Workflow
    - Tools
    - Observability
template:
  name: agent-framework-full-sample
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: AGENT_MODE
      value: "basic"
    - name: ENABLE_INSTRUMENTATION
      value: "true"
    - name: ENABLE_SENSITIVE_DATA
      value: "true"
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
